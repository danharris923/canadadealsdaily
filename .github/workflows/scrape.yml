name: scrape

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      max_deals:
        description: "Cap number of deals (blank = all)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - run: python scrape.py
        env:
          AMAZON_TAG: ${{ secrets.AMAZON_TAG }}
          PUBLIC_BASE: ${{ vars.PUBLIC_BASE }}
          MAX_DEALS: ${{ inputs.max_deals }}

      - name: commit
        run: |
          git config user.name  "scraper-bot"
          git config user.email "scraper-bot@users.noreply.github.com"
          git add deals.json images .state/seen.json
          git diff --cached --quiet || git commit -m "data: refresh deals"
          git push
